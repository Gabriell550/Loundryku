$kind: http-example
name: '200 OK'
request:
  url: '{{base_url}}/api/service-types/{{service_type_id}}'
  method: PUT
response:
  statusCode: 200
  statusText: OK
  headers:
    - key: Content-Type
      value: application/json
  body:
    type: json
    content: |-
      {
        "success": true,
        "message": "Jenis layanan berhasil diperbarui",
        "data": {
          "id": "21",
          "name": "Cuci Express",
          "unit": "kg",
          "price": 7000
        }
      }
order: 1000
