$kind: http-example
name: '404 Not Found'
request:
  url: '{{base_url}}/api/service-types/999999'
  method: GET
response:
  statusCode: 404
  statusText: Not Found
  headers:
    - key: Content-Type
      value: application/json
  body:
    type: json
    content: |-
      {
        "success": false,
        "message": "Jenis layanan tidak ditemukan",
        "data": null
      }
order: 1000
