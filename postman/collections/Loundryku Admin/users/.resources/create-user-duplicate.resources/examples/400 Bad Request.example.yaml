$kind: http-example
name: '400 Bad Request'
request:
  url: '{{base_url}}/api/users'
  method: POST
response:
  statusCode: 400
  statusText: Bad Request
  headers:
    - key: Content-Type
      value: application/json
  body:
    type: json
    content: |-
      {
        "success": false,
        "message": "Username sudah digunakan",
        "data": null
      }
order: 1000
