$kind: http-example
name: '404 Not Found'
request:
  url: '{{base_url}}/api/auth/login'
  method: POST
response:
  statusCode: 404
  statusText: Not Found
  headers:
    - key: Content-Type
      value: application/json
  body:
    type: json
    content: |-
      {
        "success": false,
        "message": "Username atau password salah",
        "data": null
      }
order: 1000
