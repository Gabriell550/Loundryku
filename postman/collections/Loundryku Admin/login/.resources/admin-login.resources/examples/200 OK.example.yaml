$kind: http-example
name: '200 OK'
request:
  url: '{{base_url}}/api/auth/login'
  method: POST
response:
  statusCode: 200
  statusText: OK
  headers:
    - key: Content-Type
      value: application/json
  body:
    type: json
    content: |-
      {
        "success": true,
        "message": "Login berhasil",
        "data": {
          "token": "eyJhbGciOiJIUzI1NiJ9.example",
          "user": {
            "id": "1",
            "username": "admin",
            "fullName": "Administrator",
            "role": "ADMIN"
          }
        }
      }
order: 1000
