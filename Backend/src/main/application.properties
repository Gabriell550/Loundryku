# === Koneksi ke MongoDB Atlas ===
# Ambil connection string dari Atlas: tombol "Connect" > "Drivers"
# Ganti <username>, <password>, dan <cluster-url> sesuai punyamu.
# Jangan taruh password asli di file yang di-commit ke Git!
spring.data.mongodb.uri=mongodb+srv://<username>:<password>@<cluster-url>/loundry_ku?retryWrites=true&w=majority

# Nama database (opsional kalau sudah ada di URI di atas)
# spring.data.mongodb.database=loundry_ku

# === Port aplikasi (default 8080) ===
server.port=8080

# === Logging supaya query mongo terlihat di console saat development ===
logging.level.org.springframework.data.mongodb.core.MongoTemplate=DEBUG
